<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jummah Mubarak</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Noto+Nastaliq+Urdu&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: linear-gradient(to bottom, #020024, #090979, #000000);
  color: white;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  height: 100vh;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  padding: 20px;
  position: relative;
  z-index: 10;
}

.text {
  font-size: 18px;
  line-height: 1.6;
  max-width: 350px;
}

/* Har word ka first letter big */
.word::first-letter {
  font-size: 28px;
  font-weight: bold;
  color: #ffd700;
}

.arabic {
  font-family: 'Amiri', serif;
  font-size: 28px;
  color: #ffd700;
  margin: 15px 0;
  display: block;
  text-shadow: 0 0 10px rgba(255,215,0,0.6);
}

.urdu {
  font-family: 'Noto Nastaliq Urdu', serif;
  font-size: 20px;
  color: #ddd;
  display: block;
  margin-bottom: 15px;
  direction: rtl;
}

/* Moon */
.moon {
  position: fixed;
  top: 40px;
  right: 40px;
  width: 70px;
  height: 70px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 40px #fff;
  z-index: 1;
}

/* Stars */
.star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* Mosque Silhouette (Using a stable SVG background) */
.mosque {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: url('https://www.transparenttextures.com/patterns/black-paper.png'), 
              linear-gradient(transparent, rgba(0,0,0,0.8));
  opacity: 0.5;
  z-index: 2;
}

/* Clouds */
.cloud {
  position: fixed;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50px;
  filter: blur(15px);
  animation: moveClouds linear infinite;
  z-index: 1;
}

@keyframes moveClouds {
  from { transform: translateX(-300px); }
  to { transform: translateX(110vw); }
}

/* Tasbeeh */
.tasbeeh-container {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  text-align: center;
}

.tasbeeh {
  background: #ffd700;
  border: none;
  color: black;
  padding: 12px 25px;
  border-radius: 30px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(255,215,0,0.4);
  transition: transform 0.2s;
}

.tasbeeh:active {
  transform: scale(0.95);
}

.counter {
  color: #ffd700;
  margin-bottom: 10px;
  font-weight: bold;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="moon"></div>

<div class="cloud" style="top:50px; width:200px; height:60px; animation-duration:50s;"></div>
<div class="cloud" style="top:150px; width:250px; height:80px; animation-duration:80s; opacity:0.05;"></div>
<div class="cloud" style="top:250px; width:180px; height:50px; animation-duration:65s;"></div>

<div class="mosque"></div>

<div class="container">
  <div class="text" id="typing">
    <span class="word">Jummah</span> <span class="word">Mubarak</span> 🤲<br><br>
    <span class="word">Aaj</span> ka din rehmaton ka din hai...<br>
    <span class="arabic">اللّٰهُمَّ اجْعَلْهَا مِنْ نَصِيبِي</span>
    <span class="urdu">اے اللہ اسے میری قسمت کا حصہ بنا دے</span>
    <span class="word">Aaj</span> ke din meri dua hai...<br>
    <span class="word">Allah</span> tumhein hamesha khush rakhe 💫<br><br>
    <span class="word">Aur</span> agar meri koi dua qabool ho...<br>
    <span class="word">to</span> wo sirf tum ho ❤️<br><br>
    <small>- Zafran</small>
  </div>
</div>

<div class="tasbeeh-container">
  <div class="counter" id="count">Tasbeeh: 0</div>
  <button class="tasbeeh" onclick="tasbeehClick()">SubhanAllah 🤍</button>
</div>

<script>
// Generate Stars
for(let i=0; i<60; i++){
  let s = document.createElement('div');
  s.className = 'star';
  s.style.top = Math.random() * 100 + '%';
  s.style.left = Math.random() * 100 + '%';
  s.style.animationDelay = Math.random() * 2 + 's';
  document.body.appendChild(s);
}

// Tasbeeh Logic
let count = 0;
function tasbeehClick(){
  count++;
  document.getElementById('count').innerText = "Tasbeeh: " + count;
}

// Noor (Sparkle) effect on click
function noor(x, y){
  for(let i=0; i<8; i++){
    const p = document.createElement('div');
    p.style.position = 'fixed';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.width = '4px';
    p.style.height = '4px';
    p.style.background = '#ffd700';
    p.style.borderRadius = '50%';
    p.style.boxShadow = '0 0 10px #ffd700';
    p.style.pointerEvents = 'none';
    p.style.zIndex = '100';
    document.body.appendChild(p);

    const dx = (Math.random() - 0.5) * 150;
    const dy = (Math.random() - 0.5) * 150;

    p.animate([
      { transform: 'translate(0,0)', opacity: 1 },
      { transform: `translate(${dx}px, ${dy}px)`, opacity: 0 }
    ], { duration: 1000, easing: 'ease-out' });

    setTimeout(() => p.remove(), 1000);
  }
}

document.addEventListener('mousedown', e => noor(e.clientX, e.clientY));
</script>

</body>
</html>
