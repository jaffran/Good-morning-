<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zafran Hacker Message</title>
<style>
body {
  margin: 0;
  background: black;
  color: #00ff99;
  font-family: monospace;
  overflow: hidden;
}canvas { position: fixed; top: 0; left: 0; z-index: -1; }

.container { display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; padding: 20px; }

.text { font-size: 18px; line-height: 1.6; border-right: 2px solid #00ff99; white-space: pre-line; overflow: hidden; animation: blink 1s infinite; }

@keyframes blink { 50% { border-color: transparent; } }

.tap { position: fixed; bottom: 20px; width: 100%; text-align: center; font-size: 14px; opacity: 0.7; } </style>

</head>
<body><canvas id="matrix"></canvas>

<div class="container">
  <div class="text" id="typing"></div>
</div><div class="tap">Tap anywhere to enable sound 🔊</div><!-- Background Music --><audio id="bgMusic" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mpeg">
</audio><script>
// Matrix Effect
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "ZAFRAN HACKER 010101 LOVE YOU";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#00ff99";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);

// Typing Effect
const message = `> Initializing Love Protocol...\n> Access Granted \n\nGood Morning Future Wife ❤\n\nTum meri zindagi ka sab se khoobsurat hissa ho...\nHar subah tumhari yaad ke sath shuru hoti hai...\n\nMain wada karta hoon...\nTumhari har muskurahat meri zimmedari hai...\n\n- Zafran Hacker`;

let i = 0;
function typing() {
  if (i < message.length) {
    document.getElementById("typing").innerHTML += message.charAt(i);
    i++;
    setTimeout(typing, 40);
  }
}

typing();

// Music Play (Mobile Fix)
const music = document.getElementById("bgMusic");

document.body.addEventListener("click", () => {
  music.play();
}, { once: true });
</script></body>
</html>
