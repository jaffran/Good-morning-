<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zafran Hacker Message</title><link href="https://fonts.googleapis.com/css2?family=Amiri&family=Poppins:wght@300;400&display=swap" rel="stylesheet"><style>
body {
  margin: 0;
  background: black;
  color: #00ff99;
  font-family: 'Poppins', monospace;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  padding: 20px;
}

.text {
  font-size: 18px;
  line-height: 1.8;
  border-right: 2px solid #00ff99;
  white-space: pre-line;
  overflow: hidden;
  animation: blink 1s infinite;
}

.arabic {
  font-family: 'Amiri', serif;
  font-size: 20px;
  color: #00ffaa;
}

@keyframes blink {
  50% { border-color: transparent; }
}

.tap {
  position: fixed;
  bottom: 60px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0.7;
}

/* Tasbeeh Button */
.tasbeeh {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: transparent;
  border: 2px solid #00ffaa;
  color: #00ffaa;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.tasbeeh:active {
  transform: translateX(-50%) scale(0.9);
  background: #00ffaa;
  color: black;
}

.counter {
  position: fixed;
  bottom: 100px;
  width: 100%;
  text-align: center;
  font-size: 18px;
  color: #00ffaa;
}

</style></head>
<body><canvas id="matrix"></canvas>

<div class="container">
  <div class="text" id="typing"></div>
</div><div class="counter" id="count">Tasbeeh Count: 0</div>
<div class="tap">Tap anywhere to enable sound 🔊</div>
<button class="tasbeeh" onclick="tasbeehClick()">SubhanAllah 🤍</button><audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio><script>
// Matrix Effect
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "ZAFRAN HACKER 010101 LOVE YOU";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#00ff99";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);

// Typing Effect
const message = `> system booting...
> access granted ✔

Good Morning ❤️

Tumhari yaad ke sath har subah shuru hoti hai...
Aur dil se sirf ek dua nikalti hai 🤲

<span class="arabic">اللّٰهُمَّ اجْعَلْهَا مِنْ نَصِيبِي</span>

(Ae Allah, usay meri qismat ka hissa bana de)

Tum sirf ek khwahish nahi...
balke meri har dua ka hissa ho 💫

Allah tumhein hamesha khush rakhe...
aur agar naseeb mein likha ho...
to hamesha mere sath rakhe ❤️

- Zafran`;

let i = 0;
function typing() {
  if (i < message.length) {
    document.getElementById("typing").innerHTML += message.charAt(i);
    i++;
    setTimeout(typing, 40);
  }
}

typing();

// Music Fix
const music = document.getElementById("bgMusic");
function startMusic() {
  music.play();
}
['click','touchstart'].forEach(e => {
  document.body.addEventListener(e, startMusic, { once: true });
});

// Tasbeeh Counter
let count = 0;
function tasbeehClick() {
  count++;
  document.getElementById("count").innerText = "Tasbeeh Count: " + count;
}
</script></body>
</html>
