<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jummah Mubarak</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Noto+Nastaliq+Urdu&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: linear-gradient(to bottom, #020024, #090979, #000000);
  color: white;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  height: 100vh;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  padding: 20px;
  position: relative;
  z-index: 10;
}

.text-box {
  max-width: 380px;
  background: rgba(255, 255, 255, 0.05);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 215, 0, 0.2);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* English styling with Golden First Letter */
.eng-word {
  display: inline-block;
  margin-right: 3px;
  font-weight: 400;
  line-height: 1.8; /* English line space */
}

.eng-word::first-letter {
  font-size: 1.5em;
  font-weight: 700;
  color: #ffd700;
  text-transform: uppercase;
}

/* Arabic Styling */
.arabic {
  font-family: 'Amiri', serif;
  font-size: 28px;
  color: #ffd700;
  margin: 15px 0;
  display: block;
  text-shadow: 0 0 10px rgba(255,215,0,0.4);
  line-height: 1.4;
}

/* Urdu Styling */
.urdu {
  font-family: 'Noto Nastaliq Urdu', serif;
  font-size: 19px;
  color: #f0f0f0;
  display: block;
  margin: 12px 0;
  line-height: 2.8; /* Extra space for Nastaliq */
  direction: rtl;
}

/* Moon & Stars */
.moon {
  position: fixed;
  top: 40px;
  right: 40px;
  width: 50px;
  height: 50px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 30px #fff;
}

.star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }

/* Tasbeeh Section */
.tasbeeh-container {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
}

.tasbeeh-btn {
  background: #ffd700;
  border: none;
  color: #000;
  padding: 10px 25px;
  border-radius: 30px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(255,215,0,0.3);
  transition: transform 0.1s;
}

.tasbeeh-btn:active { transform: scale(0.9); }

.counter {
  color: #ffd700;
  margin-bottom: 5px;
  font-size: 16px;
  text-align: center;
}
</style>
</head>
<body>

<div class="moon"></div>

<div class="container">
  <div class="text-box">
    
    <div class="message">
      <span class="eng-word">Jummah</span> <span class="eng-word">Mubarak</span> 🤲<br>
      
      <span class="urdu">آج کا دن رحمتوں کا دن ہے...</span>
      
      <span class="arabic">اللّٰهُمَّ اجْعَلْهَا مِنْ نَصِيبِي</span>
      
      <span class="urdu">اے اللہ اسے میری قسمت کا حصہ بنا دے</span>
      
      <span class="eng-word">Aaj</span> <span class="eng-word">ke</span> <span class="eng-word">din</span> <span class="eng-word">meri</span> <span class="eng-word">dua</span> <span class="eng-word">hai...</span><br>
      <span class="eng-word">Allah</span> <span class="eng-word">aapko</span> <span class="eng-word">hamesha</span> <span class="eng-word">khush</span> <span class="eng-word">rakhe</span> 💫<br>
      
      <span class="urdu">اور اگر میری کوئی دعا قبول ہو...</span>
      <span class="eng-word">To</span> <span class="eng-word">wo</span> <span class="eng-word">sirf</span> <span class="eng-word">tum</span> <span class="eng-word">ho</span> ❤️<br>
      
      <p style="margin-top:20px; color:#ffd700; font-weight:bold;">— Zafran</p>
    </div>

  </div>
</div>

<div class="tasbeeh-container">
  <div class="counter" id="count">Tasbeeh: 0</div>
  <button class="tasbeeh-btn" onclick="tasbeehClick()">SubhanAllah 🤍</button>
</div>

<script>
// Generate Stars
for(let i=0; i<60; i++){
  let s = document.createElement('div');
  s.className = 'star';
  s.style.top = Math.random() * 100 + '%';
  s.style.left = Math.random() * 100 + '%';
  document.body.appendChild(s);
}

// Tasbeeh logic
let count = 0;
function tasbeehClick(){
  count++;
  document.getElementById('count').innerText = "Tasbeeh: " + count;
}
</script>

</body>
</html>
